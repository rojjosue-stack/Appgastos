<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Pro - Full Restore</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #f4f7f6; --teal: #00796b; --income: #4caf50; --expense: #f44336; --blue: #2196F3;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 110px; color: #333; }
        
        .nav { background: #fff; display: flex; justify-content: space-around; padding: 5px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; overflow-x: auto; white-space: nowrap; }
        .nav button { background: none; border: none; font-size: 0.65rem; font-weight: bold; color: #999; padding: 12px 10px; cursor: pointer; text-transform: uppercase; flex-shrink: 0; }
        .nav button.active { color: var(--teal); border-bottom: 3px solid var(--teal); }
        
        .view { display: none; padding: 15px; animation: fadeIn 0.2s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .dashboard-container { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; position: relative; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .chart-box { position: relative; width: 150px; height: 150px; z-index: 2; }
        .monefy-icon { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3; width: 60px; text-align: center; transform: translate(-50%, -50%); }
        .monefy-icon .emoji { font-size: 1.3rem; }
        .monefy-icon .perc { font-size: 0.7rem; font-weight: bold; }

        .cat-group { background: white; border-radius: 18px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .cat-group-header { padding: 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .cat-group-content { display: none; background: #fafafa; border-top: 1px solid #eee; padding: 5px 0; }
        .cat-group.open .cat-group-content { display: block; }
        
        .item { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; background: white; }
        .icon-circle { width: 40px; height: 40px; border-radius: 50%; background: #f0f4f3; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; }
        .item-info { display: flex; align-items: center; flex-grow: 1; }
        .amount-tag { font-weight: bold; }
        .txt-expense { color: var(--expense); }
        .txt-income { color: var(--income); }
        .txt-invest { color: var(--blue); }

        .pro-header { background: linear-gradient(45deg, #1a202c, #2d3748); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-radius: 15px; }
        .fabs { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 40px; pointer-events: none; }
        .btn { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-size: 35px; box-shadow: 0 6px 15px rgba(0,0,0,0.2); pointer-events: auto; cursor: pointer; }
        .minus { background: var(--expense); }
        .plus { background: var(--income); }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 100; }
        .modal-body { background: white; width: 85%; padding: 25px; border-radius: 25px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-save { background: var(--teal); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-dash" class="active" onclick="showView('dash')">Billetera</button>
        <button id="btn-finance" onclick="showView('finance')">Sueldo/Ahorro</button>
        <button id="btn-invest" onclick="showView('invest')">Inversiones</button>
        <button id="btn-cobrar" onclick="showView('cobrar')">Cobros</button>
        <button id="btn-config" onclick="showView('config')">Iconos</button>
        <button onclick="exportDataToSheets()" style="color: #e91e63;">☁️ Exportar</button>
    </div>

    <div id="view-dash" class="view active">
        <div id="sync-status" style="font-size: 0.7rem; text-align: center;">Sincronizando...</div>
        <div class="dashboard-container" id="monefy-board">
            <div class="chart-box"><canvas id="myChart"></canvas></div>
        </div>
        <div id="total-balance" style="text-align: center; margin-bottom: 20px;"></div>
        <div id="category-group-list"></div>
    </div>

    <div id="view-finance" class="view">
        <div class="pro-header"><h3>Capital Neto</h3><div id="fin-total-header">$0</div></div>
        <div id="finance-list"></div>
    </div>

    <div id="view-invest" class="view">
        <div class="pro-header" style="background: var(--blue);"><h3>Portafolio</h3><div id="inv-total-header">$0</div></div>
        <div id="invest-list"></div>
    </div>

    <div id="view-cobrar" class="view">
        <div class="pro-header" style="background: var(--expense);"><h3>A Cobrar</h3><div id="cob-total-header">$0</div></div>
        <div id="cobrar-list"></div>
    </div>

    <div id="view-config" class="view">
        <h3>Gestionar Categorías</h3>
        <div id="category-manager-list"></div>
    </div>

    <div class="fabs">
        <button class="btn minus" onclick="openModal('expense')">−</button>
        <button class="btn plus" onclick="openModal('income')">+</button>
    </div>

    <div id="modal">
        <div class="modal-body">
            <h3 id="modal-title">Registro</h3>
            <input type="hidden" id="edit-id">
            <input type="date" id="date-input">
            <select id="currency-select"><option value="UYU">UYU</option><option value="USD">USD</option></select>
            <select id="payment-method-select"></select>
            <select id="cat-select"></select>
            <input type="number" id="amt" placeholder="Monto">
            <input type="text" id="note" placeholder="Nota">
            <button class="btn-save" onclick="save()">Guardar</button>
            <button id="btn-delete" style="display:none; color:red; border:none; background:none; width:100%; margin-top:10px;" onclick="deleteTransaction()">Eliminar</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:10px;">Cancelar</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzbVn9A8RlMuTm4Tjix9ORuUmtxUpXCpp0EfJbtRyVPuyqb8EdiEdHtei5gl9kS12y7Q/exec";
        let transactions = JSON.parse(localStorage.getItem('DB_FINAL')) || [];
        let categories = JSON.parse(localStorage.getItem('CAT_FINAL')) || [
            { id: '1', name: 'Comida', icon: '🛒', type: 'gasto', subcategories: ['Super', 'Restaurante'] },
            { id: '2', name: 'Auto', icon: '🚗', type: 'gasto', subcategories: ['Nafta', 'Service'] },
            { id: '3', name: 'Sueldo', icon: '💰', type: 'finanza', subcategories: [] },
            { id: '4', name: 'Salud', icon: '💊', type: 'gasto', subcategories: [] },
            { id: '5', name: 'Hogar', icon: '🏠', type: 'gasto', subcategories: [] },
            { id: '6', name: 'Inversión', icon: '📈', type: 'inversion', subcategories: ['ADA', 'Acciones'] },
            { id: '7', name: 'Por Cobrar', icon: '🤝', type: 'cobrar', subcategories: [] },
            { id: '8', name: 'Ahorro', icon: '🏦', type: 'finanza', subcategories: [] }
        ];
        let paymentMethods = JSON.parse(localStorage.getItem('PAY_METHODS')) || ["Efectivo", "Visa", "Itaú", "Prex"];

        async function loadFromCloud() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if(data && data.length > 0) {
                    transactions = data.map(t => ({...t, id: parseInt(t.id), amount: parseFloat(t.amount)}));
                    saveData();
                }
                document.getElementById('sync-status').innerText = "✅ Sincronizado";
            } catch(e) { document.getElementById('sync-status').innerText = "⚠️ Modo Local"; }
            refreshAll();
        }

        function saveData() {
            localStorage.setItem('DB_FINAL', JSON.stringify(transactions));
            localStorage.setItem('CAT_FINAL', JSON.stringify(categories));
        }

        function refreshAll() { renderDash(); renderFinance(); renderInvest(); renderCobrar(); renderConfig(); }

        function renderDash() {
            const list = document.getElementById('category-group-list');
            const board = document.getElementById('monefy-board');
            list.innerHTML = '';
            board.querySelectorAll('.monefy-icon').forEach(e => e.remove());

            let totalGastoUYU = 0;
            const grouped = {};

            transactions.forEach(t => {
                const c = categories.find(cat => cat.icon === t.cat);
                if (t.type === 'expense' || (c && c.type === 'gasto')) {
                    const uyu = t.currency === 'USD' ? t.amount * 43 : t.amount;
                    totalGastoUYU += uyu;
                    if(!grouped[t.cat]) grouped[t.cat] = { uyu: 0, items: [], icon: t.cat };
                    grouped[t.cat].uyu += uyu;
                    grouped[t.cat].items.push(t);
                }
            });

            Object.values(grouped).forEach((group, i) => {
                const perc = totalGastoUYU > 0 ? Math.round((group.uyu / totalGastoUYU) * 100) : 0;
                // Render lista
                let itemsHtml = group.items.map(t => `<div class="item" onclick="openEdit(${t.id})"><span>${t.sub} <small>${t.note || ''}</small></span><span class="txt-expense">-$${t.amount} ${t.currency}</span></div>`).join('');
                list.innerHTML += `<div class="cat-group" id="g-${i}"><div class="cat-group-header" onclick="toggleGroup('g-${i}')"><div>${group.icon} <strong>${group.icon}</strong></div><div class="txt-expense">$${group.uyu.toLocaleString()} UYU</div></div><div class="cat-group-content">${itemsHtml}</div></div>`;
                
                // Render Iconos en Círculo
                const angle = (i * (360 / Object.keys(grouped).length)) - 90;
                const x = Math.cos(angle * Math.PI / 180) * 115;
                const y = Math.sin(angle * Math.PI / 180) * 115;
                const div = document.createElement('div');
                div.className = 'monefy-icon';
                div.style.left = `calc(50% + ${x}px)`; div.style.top = `calc(50% + ${y}px)`;
                div.innerHTML = `<span class="emoji">${group.icon}</span><span class="perc">${perc}%</span>`;
                board.appendChild(div);
            });
        }

        function renderFinance() {
            const div = document.getElementById('finance-list');
            div.innerHTML = ''; let total = 0;
            transactions.filter(t => {
                const c = categories.find(cat => cat.icon === t.cat);
                return c && c.type === 'finanza';
            }).forEach(t => {
                total += (t.currency === 'USD' ? t.amount * 43 : t.amount);
                div.innerHTML += `<div class="item" onclick="openEdit(${t.id})"><div>${t.cat} ${t.sub}</div><div class="txt-income">$${t.amount} ${t.currency}</div></div>`;
            });
            document.getElementById('fin-total-header').innerText = `$${total.toLocaleString()} UYU`;
        }

        function renderCobrar() {
            const div = document.getElementById('cobrar-list');
            div.innerHTML = ''; let total = 0;
            transactions.filter(t => {
                const c = categories.find(cat => cat.icon === t.cat);
                return c && c.type === 'cobrar';
            }).forEach(t => {
                total += (t.currency === 'USD' ? t.amount * 43 : t.amount);
                div.innerHTML += `<div class="item" onclick="openEdit(${t.id})"><div>${t.cat} ${t.sub}</div><div class="txt-expense">$${t.amount} ${t.currency}</div></div>`;
            });
            document.getElementById('cob-total-header').innerText = `$${total.toLocaleString()} UYU`;
        }

        function renderInvest() {
            const div = document.getElementById('invest-list');
            div.innerHTML = ''; let total = 0;
            transactions.filter(t => {
                const c = categories.find(cat => cat.icon === t.cat);
                return c && c.type === 'inversion';
            }).forEach(t => {
                total += (t.currency === 'USD' ? t.amount * 43 : t.amount);
                div.innerHTML += `<div class="item" onclick="openEdit(${t.id})"><div>${t.cat} ${t.sub}</div><div class="txt-invest">$${t.amount} ${t.currency}</div></div>`;
            });
            document.getElementById('inv-total-header').innerText = `$${total.toLocaleString()} UYU`;
        }

        function renderConfig() {
            const div = document.getElementById('category-manager-list');
            div.innerHTML = categories.map(c => `<div class="item"><span>${c.icon} ${c.name} (${c.type})</span><button onclick="deleteCategory('${c.id}')" style="color:red; background:none; border:none;">Eliminar</button></div>`).join('');
            div.innerHTML += `<div style="margin-top:20px; border-top:1px solid #ddd; padding-top:10px;">
                <input type="text" id="new-cat-name" placeholder="Nombre">
                <input type="text" id="new-cat-icon" placeholder="Emoji">
                <select id="new-cat-type"><option value="gasto">Gasto</option><option value="finanza">Sueldo</option><option value="inversion">Inversión</option><option value="cobrar">Cobro</option></select>
                <button class="btn-save" onclick="addCategory()">+ Agregar Categoría</button>
            </div>`;
        }

        function addCategory() {
            const n = document.getElementById('new-cat-name').value;
            const i = document.getElementById('new-cat-icon').value;
            const t = document.getElementById('new-cat-type').value;
            if(!n || !i) return;
            categories.push({ id: Date.now().toString(), name: n, icon: i, type: t, subcategories: [] });
            saveData(); refreshAll();
        }

        function deleteCategory(id) {
            if(confirm("¿Eliminar categoría?")) {
                categories = categories.filter(c => c.id !== id);
                saveData(); refreshAll();
            }
        }

        function showView(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.getElementById('btn-'+v).classList.add('active');
        }

        function toggleGroup(id) { document.getElementById(id).classList.toggle('open'); }

        function openModal(type) {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('edit-id').value = "";
            document.getElementById('date-input').value = new Date().toISOString().split('T')[0];
            const pSel = document.getElementById('payment-method-select'); pSel.innerHTML = paymentMethods.map(m => `<option value="${m}">${m}</option>`).join('');
            const cSel = document.getElementById('cat-select');
            cSel.innerHTML = categories.filter(c => type === 'income' ? c.type === 'finanza' : (c.type !== 'finanza')).map(c => {
                if(c.subcategories.length > 0) return c.subcategories.map(s => `<option value="${c.icon}|${s}">${c.icon} ${s}</option>`).join('');
                return `<option value="${c.icon}|${c.name}">${c.icon} ${c.name}</option>`;
            }).join('');
        }

        function openEdit(id) {
            const t = transactions.find(x => x.id === id);
            if(!t) return;
            openModal(t.type === 'income' ? 'income' : 'expense');
            document.getElementById('edit-id').value = id;
            document.getElementById('amt').value = t.amount;
            document.getElementById('note').value = t.note || "";
            document.getElementById('btn-delete').style.display = 'block';
        }

        async function save() {
            const eid = document.getElementById('edit-id').value;
            const amt = parseFloat(document.getElementById('amt').value);
            const catVal = document.getElementById('cat-select').value.split('|');
            const catObj = categories.find(c => c.icon === catVal[0]);
            
            const transObj = {
                id: eid ? parseInt(eid) : Date.now(),
                amount: amt, currency: document.getElementById('currency-select').value,
                date: document.getElementById('date-input').value,
                cat: catVal[0], sub: catVal[1], note: document.getElementById('note').value,
                method: document.getElementById('payment-method-select').value,
                type: (catObj && catObj.type === 'finanza') ? 'income' : 'expense'
            };

            if(eid) transactions[transactions.findIndex(t => t.id == eid)] = transObj;
            else transactions.push(transObj);
            
            saveData();
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(transObj) });
            closeModal(); refreshAll();
        }

        function deleteTransaction() {
            if(confirm("¿Eliminar?")) {
                transactions = transactions.filter(t => t.id != document.getElementById('edit-id').value);
                saveData(); closeModal(); refreshAll();
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('btn-delete').style.display = 'none'; }

        window.onload = loadFromCloud;
    </script>
</body>
</html>
