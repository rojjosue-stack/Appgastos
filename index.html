<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Pro - Restauración Categorías</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #f4f7f6; --teal: #00796b; --income: #4caf50; --expense: #f44336; --gold: #fbc02d; --purple: #9c27b0; --blue: #2196F3;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 110px; color: #333; }
        
        .nav { background: #fff; display: flex; justify-content: space-around; padding: 5px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; overflow-x: auto; white-space: nowrap; }
        .nav button { background: none; border: none; font-size: 0.65rem; font-weight: bold; color: #999; padding: 12px 10px; cursor: pointer; text-transform: uppercase; flex-shrink: 0; }
        .nav button.active { color: var(--teal); border-bottom: 3px solid var(--teal); }
        
        .view { display: none; padding: 15px; animation: fadeIn 0.2s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .dashboard-container { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; position: relative; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .chart-box { position: relative; width: 150px; height: 150px; z-index: 2; }
        .monefy-icon { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3; width: 60px; text-align: center; transform: translate(-50%, -50%); }
        .monefy-icon .emoji { font-size: 1.3rem; }
        .monefy-icon .perc { font-size: 0.7rem; font-weight: bold; margin-top: 2px; }

        .cat-group { background: white; border-radius: 18px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .cat-group-header { padding: 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .cat-group-content { display: none; background: #fafafa; border-top: 1px solid #eee; padding: 5px 0; }
        .cat-group.open .cat-group-content { display: block; }
        
        .item { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; gap: 10px; background: white; }
        .item-info { display: flex; align-items: center; overflow: hidden; flex-grow: 1; }
        .item-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.85rem; }
        .item-note { font-size: 0.75rem; color: #888; display: block; margin-top: 2px; }
        
        .amount-tag { white-space: nowrap; text-align: right; font-weight: bold; min-width: fit-content; flex-shrink: 0; }
        .txt-expense { color: var(--expense) !important; }
        .txt-income { color: var(--income) !important; }
        .txt-invest { color: var(--blue) !important; }

        .icon-circle { width: 40px; height: 40px; border-radius: 50%; background: #f0f4f3; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; flex-shrink: 0; }
        
        .btn-hide { background: none; border: none; color: #ddd; cursor: pointer; font-size: 1rem; padding: 5px; margin-left: 8px; }
        .pro-header { background: linear-gradient(45deg, #1a202c, #2d3748); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-radius: 15px; }
        .pro-total { font-size: 1.2rem; font-weight: 800; }

        .fabs { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 40px; pointer-events: none; }
        .btn { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-size: 35px; box-shadow: 0 6px 15px rgba(0,0,0,0.2); pointer-events: auto; cursor: pointer; }
        .minus { background: var(--expense); }
        .plus { background: var(--income); }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 100; }
        .modal-body { background: white; width: 85%; padding: 25px; border-radius: 25px; max-height: 90vh; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-save { background: var(--teal); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-dash" class="active" onclick="showView('dash')">Billetera</button>
        <button id="btn-finance" onclick="showView('finance')">Sueldo/Ahorro</button>
        <button id="btn-report" onclick="showView('report')">Reporte Pagos</button>
        <button id="btn-invest" onclick="showView('invest')">Inversiones</button>
        <button id="btn-cobrar" onclick="showView('cobrar')">Cobros</button>
        <button id="btn-config" onclick="showView('config')">Iconos</button>
    </div>

    <div id="view-dash" class="view active">
        <div class="dashboard-container" id="monefy-board">
            <div class="chart-box"><canvas id="myChart"></canvas></div>
        </div>
        <div id="total-balance" style="text-align: center; margin-bottom: 20px;"></div>
        <div id="category-group-list"></div>
    </div>

    <div id="view-finance" class="view">
        <div class="pro-header"><h3>Capital Neto</h3><div class="pro-total" id="fin-total-header">$0</div></div>
        <div id="finance-income-list"></div>
        <div id="finance-savings-list" style="margin-top: 15px;"></div>
    </div>

    <div id="view-report" class="view">
        <h3 style="margin-bottom: 15px;">Sumatoria Mensual por Método</h3>
        <div id="report-payments-list"></div>
    </div>

    <div id="view-invest" class="view">
        <div class="pro-header" style="background: linear-gradient(45deg, #2b6cb0, #4299e1);"><h3>Portafolio</h3><div class="pro-total" id="inv-total-header">$0</div></div>
        <div id="invest-list"></div>
    </div>

    <div id="view-cobrar" class="view"><h3 style="margin-bottom: 15px;">Cuentas por Cobrar</h3><div id="cobrar-list"></div></div>

    <div id="view-config" class="view">
        <h3>Gestionar Categorías</h3>
        <div id="category-manager-list"></div>
    </div>

    <div class="fabs">
        <button class="btn minus" onclick="openModal('expense')">−</button>
        <button class="btn plus" onclick="openModal('income')">+</button>
    </div>

    <div id="modal">
        <div class="modal-body">
            <h3 id="modal-title">Registro</h3>
            <input type="hidden" id="edit-id"><input type="date" id="date-input">
            <div style="display: flex; gap: 10px;">
                <select id="currency-select"><option value="UYU">UYU</option><option value="USD">USD</option></select>
                <select id="payment-method-select"></select>
            </div>
            <select id="cat-select"></select>
            <input type="number" id="amt" placeholder="Monto">
            <input type="text" id="note" placeholder="Nota / Motivo">
            <button class="btn-save" onclick="save()">Guardar</button>
            <button id="btn-delete" style="display:none; color:red; border:none; background:none; width:100%; margin-top:10px;" onclick="deleteTransaction()">Eliminar</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; color:gray; margin-top:15px;">Cancelar</button>
        </div>
    </div>

    <script>
        let myChart = null;
        const palette = ['#FF7043', '#26A69A', '#AB47BC', '#42A5F5', '#FFA726', '#78909C', '#EF5350', '#8D6E63', '#9CCC65'];

        // CARGA DE DATOS: Prioriza lo que ya existe en el navegador
        let transactions = JSON.parse(localStorage.getItem('DB_FINAL')) || [];
        let categories = JSON.parse(localStorage.getItem('CAT_FINAL')) || [
            { id: '1', name: 'Comida', icon: '🛒', type: 'gasto', subcategories: ['Super', 'Restaurante'] },
            { id: '2', name: 'Auto', icon: '🚗', type: 'gasto', subcategories: ['Cuota', 'Nafta'] },
            { id: '3', name: 'Sueldo', icon: '💰', type: 'finanza', subcategories: [] }
        ];
        let paymentMethods = JSON.parse(localStorage.getItem('PAY_METHODS')) || ["Efectivo", "Visa Santander", "Oca Blue", "Prex", "Itaú", "Débito"];

        function saveData() {
            localStorage.setItem('DB_FINAL', JSON.stringify(transactions));
            localStorage.setItem('CAT_FINAL', JSON.stringify(categories));
            localStorage.setItem('PAY_METHODS', JSON.stringify(paymentMethods));
        }

        function formatValue(n, cur) { return cur === 'USD' ? `${n.toLocaleString()} $` : `${n.toLocaleString()} UYU`; }
        function formatDateShort(s) { if(!s) return ""; const d = new Date(s + 'T12:00:00'); return `${d.getDate()}/${d.getMonth()+1}`; }

        function renderDash() {
            const list = document.getElementById('category-group-list');
            const board = document.getElementById('monefy-board');
            if(!list || !board) return;
            
            list.innerHTML = '';
            board.querySelectorAll('.monefy-icon').forEach(el => el.remove());
            
            let balUYU = 0, balUSD = 0, totalGastoUYU = 0;
            const chartTotals = {};
            const grouped = {};

            transactions.forEach(t => {
                const monto = parseFloat(t.amount) || 0;
                const impact = (t.type === 'income' ? monto : -monto);
                if(t.currency === 'USD') balUSD += impact; else balUYU += impact;
                
                // Buscamos la categoría. Si no existe en la lista actual, creamos un objeto temporal para no perder el dato
                let catObj = categories.find(c => c.icon === t.cat);
                
                // Solo procesamos como gasto para el Dashboard si el tipo de transacción es 'expense'
                if(t.type === 'expense') {
                    const valUYU = (t.currency === 'USD' ? monto * 43 : monto);
                    
                    // Si la categoría no existe o es de tipo gasto, la sumamos al dashboard
                    if(!catObj || catObj.type === 'gasto') {
                        chartTotals[t.cat] = (chartTotals[t.cat] || 0) + valUYU;
                        totalGastoUYU += valUYU;
                        
                        if(!grouped[t.cat]) {
                            grouped[t.cat] = { 
                                name: catObj ? catObj.name : "Otros", 
                                icon: t.cat, 
                                id: catObj ? catObj.id : Date.now() + Math.random(), 
                                uyu: 0, 
                                items: [] 
                            };
                        }
                        grouped[t.cat].uyu += valUYU;
                        grouped[t.cat].items.push(t);
                    }
                }
            });

            // Dibujar iconos del gráfico
            const icons = Object.keys(chartTotals);
            icons.forEach((icon, i) => {
                const angle = (i * (360 / icons.length)) - 90;
                const x = Math.cos(angle * Math.PI / 180) * 115;
                const y = Math.sin(angle * Math.PI / 180) * 115;
                const perc = totalGastoUYU > 0 ? Math.round((chartTotals[icon] / totalGastoUYU) * 100) : 0;
                const div = document.createElement('div');
                div.className = 'monefy-icon';
                div.style.left = `calc(50% + ${x}px)`; div.style.top = `calc(50% + ${y}px)`;
                div.innerHTML = `<span class="emoji">${icon}</span><span class="perc" style="color:${palette[i % palette.length]}">${perc}%</span>`;
                board.appendChild(div);
            });

            // Dibujar lista de grupos
            Object.values(grouped).forEach(group => {
                let itemsHtml = group.items.map(t => `
                    <div class="item" onclick="openEdit(${t.id})">
                        <div class="item-info">
                            <div class="icon-circle">${group.icon}</div>
                            <div class="item-text"><strong>${t.sub}</strong><span class="item-note">${t.note || ''} • ${formatDateShort(t.date)}</span></div>
                        </div>
                        <div class="amount-tag txt-expense">${formatValue(t.amount, t.currency)}</div>
                    </div>`).join('');

                list.innerHTML += `
                    <div class="cat-group" id="g-${group.id}">
                        <div class="cat-group-header" onclick="toggleGroup('g-${group.id}')">
                            <div>${group.icon} <strong>${group.name}</strong></div>
                            <div class="amount-tag txt-expense">${group.uyu.toLocaleString()} UYU</div>
                        </div>
                        <div class="cat-group-content">${itemsHtml}</div>
                    </div>`;
            });

            document.getElementById('total-balance').innerHTML = `<h2>${balUYU.toLocaleString()} UYU</h2><small>${balUSD.toLocaleString()} USD</small>`;
            
            if(myChart) myChart.destroy();
            const ctx = document.getElementById('myChart');
            if(ctx) {
                myChart = new Chart(ctx, { 
                    type: 'doughnut', 
                    data: { 
                        labels: Object.keys(chartTotals), 
                        datasets: [{ data: Object.values(chartTotals), backgroundColor: palette, borderWidth: 0, cutout: '85%' }] 
                    }, 
                    options: { plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false } 
                });
            }
        }

        // Resto de funciones (save, refreshAll, etc.)
        function refreshAll() { renderDash(); renderFinance(); renderReport(); renderInvest(); renderCobrar(); renderConfig(); }
        function showView(v) { 
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.getElementById('btn-'+v).classList.add('active');
            refreshAll();
        }
        function toggleGroup(id) { 
            const el = document.getElementById(id);
            if(el) el.classList.toggle('open'); 
        }

        function save() {
            const eid = document.getElementById('edit-id').value;
            const amt = parseFloat(document.getElementById('amt').value);
            const catVal = document.getElementById('cat-select').value.split('|');
            if(!amt) return;
            const catObj = categories.find(c => c.icon === catVal[0]);
            const transObj = {
                id: eid ? parseInt(eid) : Date.now(),
                amount: amt, 
                currency: document.getElementById('currency-select').value,
                date: document.getElementById('date-input').value,
                cat: catVal[0], 
                sub: catVal[1], 
                note: document.getElementById('note').value,
                method: document.getElementById('payment-method-select').value,
                type: (catObj && (catObj.type === 'gasto' || catObj.type === 'inversion' || catObj.type === 'cobrar')) ? 'expense' : 'income'
            };
            if(eid) { 
                const idx = transactions.findIndex(t => t.id == eid); 
                transactions[idx] = transObj; 
            } else {
                transactions.push(transObj);
            }
            saveData(); closeModal(); refreshAll();
        }

        function openModal(type) {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('edit-id').value = ""; 
            document.getElementById('amt').value = "";
            document.getElementById('date-input').value = new Date().toISOString().split('T')[0];
            const pSel = document.getElementById('payment-method-select'); pSel.innerHTML = '';
            paymentMethods.forEach(m => pSel.innerHTML += `<option value="${m}">${m}</option>`);
            const cSel = document.getElementById('cat-select'); cSel.innerHTML = '';
            categories.filter(c => type === 'income' ? c.type === 'finanza' : (c.type === 'gasto' || c.type === 'inversion' || c.type === 'cobrar')).forEach(c => {
                if(c.subcategories && c.subcategories.length > 0) c.subcategories.forEach(s => cSel.innerHTML += `<option value="${c.icon}|${s}">${c.icon} ${c.name} > ${s}</option>`);
                else cSel.innerHTML += `<option value="${c.icon}|${c.name}">${c.icon} ${c.name}</option>`;
            });
        }

        function openEdit(id) {
            const t = transactions.find(x => x.id === id);
            if(!t) return;
            openModal(t.type === 'income' ? 'income' : 'expense');
            document.getElementById('edit-id').value = id; 
            document.getElementById('amt').value = t.amount;
            document.getElementById('date-input').value = t.date; 
            document.getElementById('note').value = t.note || "";
            document.getElementById('payment-method-select').value = t.method;
            document.getElementById('cat-select').value = `${t.cat}|${t.sub}`;
            document.getElementById('btn-delete').style.display = 'block';
        }

        function deleteTransaction() {
            if(confirm("¿Eliminar?")) {
                const eid = document.getElementById('edit-id').value;
                transactions = transactions.filter(t => t.id != eid);
                saveData(); closeModal(); refreshAll();
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('btn-delete').style.display = 'none';
        }

        // Funciones de renderizado simple para las otras pestañas
        function renderFinance() { /* Lógica similar a la anterior */ }
        function renderReport() { /* Lógica similar a la anterior */ }
        function renderInvest() { /* Lógica similar a la anterior */ }
        function renderCobrar() { /* Lógica similar a la anterior */ }
        function renderConfig() { 
            const list = document.getElementById('category-manager-list'); 
            if(!list) return; list.innerHTML = ''; 
            categories.forEach(c => { 
                list.innerHTML += `<div class="item"><div>${c.icon} ${c.name} (${c.type})</div></div>`; 
            }); 
        }

        window.onload = () => { refreshAll(); };
    </script>
</body>
</html>
